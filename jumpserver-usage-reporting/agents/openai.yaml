interface:
  display_name: "JumpServer Usage Reporting"
  short_description: "JumpServer V4.10 单 skill 接入描述。适用于某天或某时间段的使用情况、排行、概览和 HTML 报告生成。"
  default_prompt: |
    使用 $jumpserver-usage-reporting 处理 JumpServer V4.10 使用报告与时间范围分析。
    当这个子目录被单独注册为 skill 根目录时，优先使用本地入口：
    - `python3 scripts/jms_report.py daily-usage --date 20260310`
    - `python3 scripts/jms_report.py daily-usage --period 上周`
    这些本地入口会从仓库根目录加载共享底层 `jumpserver-api/...`；如果共享目录不存在，说明当前 skill 包不完整。
    先把自然语言时间表达归一化为明确时间窗。成功生成后必须先明确说明“报告已生成”，并回显产物与校验摘要。