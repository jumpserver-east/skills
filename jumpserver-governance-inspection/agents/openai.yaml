interface:
  display_name: "JumpServer Governance Inspection"
  short_description: "JumpServer V4.10 单 skill 接入描述。适用于 capability 聚合、治理巡检、系统设置、许可证、工单、存储和组件分析。"
  default_prompt: |
    使用 $jumpserver-governance-inspection 处理 JumpServer V4.10 治理巡检和 capability 聚合分析。
    当这个子目录被单独注册为 skill 根目录时，优先使用本地入口：
    - `python3 scripts/jms_diagnose.py inspect --capability hot-assets-ranking --days 30`
    - `python3 scripts/jms_diagnose.py settings-category --category security`
    - `python3 scripts/jms_diagnose.py tickets --state pending`
    这些本地入口会从仓库根目录加载共享底层 `jumpserver-api/...`；如果共享目录不存在，说明当前 skill 包不完整。
    优先 capability，不手工拼多条零散查询；仍然遵守共享的只读边界和组织阻塞规则。